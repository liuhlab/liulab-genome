# Read the Docs configuration for liulab-genome.
#
# RTD doesn't natively understand pixi, so we use the `build.commands` escape
# hatch to install pixi ourselves and reproduce the project's `docs` env from
# the committed pixi.lock. This keeps RTD's build identical to local
# `pixi run docs` output.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"   # only used to bootstrap; pixi provides the real interpreter
  commands:
    - curl -fsSL https://pixi.sh/install.sh | bash
    - export PATH="$HOME/.pixi/bin:$PATH" && pixi install --locked --environment docs
    - export PATH="$HOME/.pixi/bin:$PATH" && pixi run --environment docs mkdocs build --strict --site-dir "$READTHEDOCS_OUTPUT/html"
