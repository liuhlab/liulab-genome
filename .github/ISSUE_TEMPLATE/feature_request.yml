name: Feature request
description: Propose a new feature for liulab-genome — written tightly enough to hand to @claude.
title: "feat: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Treat this issue as a **spec**. The clearer it is, the smaller the PR and
        the less back-and-forth it takes to land. The bottom of the form is a
        "done = …" checklist — that's the bar before this can be marked complete.

        If you're not sure about a section, write what you do know and leave the
        rest with `?` — a reviewer can fill in the gaps before assigning.

  - type: textarea
    id: summary
    attributes:
      label: One-line summary
      description: What is the feature, in one sentence?
      placeholder: "Add a streaming FASTA reader that yields (name, DNA) pairs."
    validations:
      required: true

  - type: textarea
    id: signature
    attributes:
      label: Desired public signature
      description: |
        Sketch the public API as Python. Names, types, return shape — even if
        rough. This is what the agent (or human) will implement against.
      render: python
      placeholder: |
        # src/genome/io/fasta.py

        def iter_fasta(
            path: Path | str,
            *,
            assembly: str,
        ) -> Iterator[tuple[str, DNA]]:
            """Stream (record_id, sequence) pairs from a (bgzipped) FASTA."""
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Behavior
      description: |
        What does it do? When does it succeed, when does it fail? Be specific
        about error types and messages — "Errors must be actionable" per
        `CLAUDE.md §4`.
      placeholder: |
        - Yields one (id, DNA) per record, in file order.
        - Raises FileNotFoundError if path is missing.
        - Raises ValueError naming the offending bases if a record contains
          characters outside A/C/G/T (no IUPAC for now).
        - Closes the file handle on iterator exhaustion AND on early `break`.
    validations:
      required: true

  - type: textarea
    id: edge_cases
    attributes:
      label: Edge cases
      description: |
        Empty inputs, very large inputs, malformed inputs, encoding, concurrent
        access, etc. List every case the implementation must handle.
      placeholder: |
        - Empty file → yields nothing, no error.
        - Record with empty sequence → yields (id, DNA('')).
        - Multi-GB file → must stream (do not load into memory).
        - bgzipped + .gzi index present → use random access? (out of scope here)
        - Windows line endings → tolerated.
    validations:
      required: true

  - type: checkboxes
    id: invariants
    attributes:
      label: Domain invariants that apply (CLAUDE.md §5)
      description: |
        Which of the project's standing invariants does this feature have to
        respect? If you check "Coordinate systems", explain in the next box
        which direction the conversion happens.
      options:
        - label: Coordinate systems — must convert at the I/O boundary (internal is 0-based half-open)
        - label: Reference assembly — must be carried in metadata, never assumed
        - label: Chromosome naming — must normalize `chr1` vs `1` at ingest
        - label: Strand — `+` / `-` / `.` (no silent default to `+`)
        - label: Large files stream — no whole-file reads into memory
        - label: Metadata is first-class — must travel with the data across transforms

  - type: textarea
    id: invariant_notes
    attributes:
      label: Notes on invariants (if any boxes above)
      description: How exactly does this feature interact with the boxes you checked?
      placeholder: |
        Coordinate systems: FASTA is sequence-only so no interval conversion;
        but if we ever add a `to_intervals()` helper, it must emit 0-based
        half-open coordinates.

  - type: textarea
    id: examples
    attributes:
      label: Worked examples (will become docstring + test cases)
      description: |
        Show inputs and expected outputs. These will be lifted into the NumPy
        docstring's `Examples` section AND into pytest cases — so they need
        to be exact, copy-pastable, and unambiguous.
      render: python
      placeholder: |
        >>> from genome.io import iter_fasta
        >>> list(iter_fasta("tests/data/two_records.fa", assembly="GRCh38"))
        [('chr1', DNA('ACGT')), ('chr2', DNA('GGCC'))]
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Explicitly out of scope
      description: |
        What is NOT this feature? Helps prevent scope creep and clarifies what
        a follow-up issue should cover.
      placeholder: |
        - Writing FASTA (separate issue).
        - Random access via .fai/.gzi index (separate issue).
        - IUPAC ambiguity codes (not adding them anywhere — see CLAUDE.md §4).

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Existing packages, shell pipelines, or in-house code that could do this
        instead. Why is it worth landing in this package?
      placeholder: |
        - pyfaidx supports random access but pulls full deps; we only need
          streaming for now.
        - `samtools faidx | awk ...` works but loses Python types.

  - type: checkboxes
    id: done_definition
    attributes:
      label: Definition of done
      description: |
        Per `CLAUDE.md §6/§7/§10`, a feature is not done until **all** of
        these are true. This is the checklist a reviewer (and CI) will use.
      options:
        - label: Public functions/methods have full type annotations
          required: true
        - label: NumPy-style docstrings on every public surface (Parameters / Returns / Raises / Examples)
          required: true
        - label: Pytest cases for examples AND edge cases (hypothesis property tests where an invariant exists)
          required: true
        - label: Hand-authored Markdown page added/updated under `docs/` (the primary doc — not just the auto-rendered reference)
          required: true
        - label: Skill (`skills/genome/SKILL.md`) updated if the public API or CLI surface changed
          required: true
        - label: "`CHANGELOG.md` Unreleased section updated"
          required: true
        - label: "`pixi run check` is green"
          required: true
