name: Claude

# Responds to @claude mentions in issues, PR comments, PR reviews, and review
# comments. The pixi env is set up first so the agent can run `pixi run check`
# inside its working steps.
#
# Setup (one-off, by a maintainer):
#   1. Run `/install-github-app` in Claude Code locally to install the Claude
#      Code GitHub App on this repository. The slash command will offer to
#      write a workflow file — KEEP THIS ONE (it has the pixi setup the project
#      requires) and just install the app + secrets.
#   2. Add an `ANTHROPIC_API_KEY` repository secret (Settings → Secrets and
#      variables → Actions) unless you're using the OAuth flow via the app.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0.8.14
        with:
          environments: default
          locked: true
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
